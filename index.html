<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="culturama-favico.png">
    <title>Pesquisa culturama</title>
     <style>
      * {
        margin: 0;
        padding: 0;
      }

      fieldset {
        border: none;

        & legend {
          position: absolute;
          width: 1px;
          height: 1px;
          margin: -1px;
          overflow: hidden;
          clip: rect(0, 0, 0, 0);
          white-space: nowrap;
          border-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
        <img src="img/logo-culturama.png" alt="logo_culturama">
      <h1>Pesquisa Online</h1>
    </header>
    <main>
      <section>
        <form action="" method="get">
          <fieldset>
            <legend>Dados pessoais</legend>
            <label for="name">Nome</label>
            <input id="name" type="text" name="userName" required />
            <br />
            <label for="age">Idade</label>
            <input
              id="age"
              type="number"
              name="userAge"
              min="12"
              max="100"
              required
            />
            <br />
            <label for="birthDate">Data de nascimento</label>
            <input id="birthDate" type="date" name="userbirthDate" required />
            <br />
            <label for="email">Email</label>
            <input id="email" type="email" name="userEmail" required />
            <br />
            <label for="phoneNumber">Telefone</label>
            <input
              id="phoneNumber"
              type="tel"
              name="userPhoneNumber"
              maxlength="11"
              pattern="[0-9]{11}"
              placeholder="DDD + números sem espaços ou hífen"
              required
            />
            <br />
            <label for="image">Upload de imagem</label>
            <input id="image" type="file" accept="image/*" name="userImage" />
            <br />
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>

            <input type="radio" id="fem" name="userGender" value="feminino" />
            <label for="fem">Feminino</label>

            <input type="radio" id="masc" name="userGender" value="masculino" />
            <label for="masc">Masculino</label>

            <input type="radio" id="notInformed" name="userGender" value="notInformed" />
            <label for="notInformed">Prefiro não informar</label>

            <label for="maritalStatus">Estado civil</label>
            <select id="maritalStatus" name="userMaritalStatus">
              <option value="notInformed">Selecione...</option>
              <option value="casado">Casado</option>
              <option value="solteiro">Solteiro</option>
              <option value="divorciado">Divorciado</option>
              <option value="uniaoEstavel">União Estável</option>
            </select>

            <label for="state">Estado</label>
            <select id="state" name="userState" required>
              <option value="AC">Acre</option>
              <option value="AL">Alagoas</option>
              <option value="AP">Amapá</option>
              <option value="AM">Amazonas</option>
              <option value="BA">Bahia</option>
              <option value="CE">Ceará</option>
              <option value="DF">Distrito Federal</option>
              <option value="ES">Espirito Santo</option>
              <option value="GO">Goiás</option>
              <option value="MA">Maranhão</option>
              <option value="MS">Mato Grosso do Sul</option>
              <option value="MT">Mato Grosso</option>
              <option value="MG">Minas Gerais</option>
              <option value="PA">Pará</option>
              <option value="PB">Paraíba</option>
              <option value="PR">Paraná</option>
              <option value="PE">Pernambuco</option>
              <option value="PI">Piauí</option>
              <option value="RJ">Rio de Janeiro</option>
              <option value="RN">Rio Grande do Norte</option>
              <option value="RS">Rio Grande do Sul</option>
              <option value="RO">Rondônia</option>
              <option value="RR">Roraima</option>
              <option value="SC">Santa Catarina</option>
              <option value="SP">São Paulo</option>
              <option value="SE">Sergipe</option>
              <option value="TO">Tocantins</option>
            </select>

            <label for="city">Cidade</label>
            <input type="text" id="city" name="userCity" />
          </fieldset>

          <fieldset>
            <legend>Hábitos</legend>

            <p>Redes sociais:</p>

            <input type="checkbox" id="instagram" name="social" value="instagram" />
            <label for="instagram">Instagram</label>
            <br />
            <input type="checkbox" id="facebook" name="social" value="facebook" />
            <label for="facebook">Facebook</label>
            <br />
            <input type="checkbox" id="linkedin" name="social" value="linkedin" />
            <label for="linkedin">Linkedin</label>
            <br />
            <input type="checkbox" id="twitter" name="social" value="twitter" />
            <label for="twitter">Twitter</label>
            <br />

            <label for="musicStyle">Estilo musical:</label>
            <input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
            <datalist id="styleTypes">
                <option value="Rock">
                <option value="Pop">
                <option value="Samba">
                <option value="Sertanejo">
            </datalist>

            <label for="favoriteColor">Cor favorita:</label>
            <input type="color" name="userFavoriteColor" id="favoriteColor">

          </fieldset>

          <fieldset>
            <legend>Opinião</legend>

            <p>O que você acha da qualidade do nosso serviço?</p>

            <input type="radio" name="userOpinionGrade" id="ruim" value="ruim">
            <label for="ruim">Ruim</label>
            <br>
            <input type="radio" name="userOpinionGrade" id="regular" value="regular">
            <label for="regular">Regular</label>
            <br>
            <input type="radio" name="userOpinionGrade" id="boa" value="boa">
            <label for="boa">Boa</label>
            <br>
            <input type="radio" name="userOpinionGrade" id="otima" value="otima">
            <label for="otima">Ótima</label>
            <br>

            <label for="comment">Opinão detalhada:</label>
            <textarea name="userComment" id="comment" placeholder="Digite aqui sua opinião..."></textarea>

          </fieldset>

          <fieldset>

            <legend>Confirmações</legend>

            <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="confirmed" required>
            <label for="userLgpdTerm">Eu aceito participar da pesquisa</label>
            <br>

            <input type="checkbox" name="userGetResult" id="getResult" value="confirmed">
            <label for="getResult">Desejo receber o resultado por email</label>

          </fieldset>

          <button type="submit">Enviar</button>
          <button type="reset">Limpar</button>
        </form>
      </section>
    </main>
  </body>
</html>
